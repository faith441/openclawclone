<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Zenthral AI Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            text-align: center;
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .status {
            margin: 20px 0;
            padding: 16px;
            border-radius: 8px;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div id="loadingState">
            <div class="icon">⚡</div>
            <h1>Verifying your email...</h1>
            <div class="spinner"></div>
        </div>

        <div id="successState" style="display: none;">
            <div class="icon">✅</div>
            <h1>Email Verified!</h1>
            <div class="status success">
                Your email has been successfully verified.
            </div>
            <p>You can now access all features of Zenthral AI Platform.</p>
            <a href="/auth/login" class="btn">Go to Login</a>
        </div>

        <div id="errorState" style="display: none;">
            <div class="icon">❌</div>
            <h1>Verification Failed</h1>
            <div class="status error" id="errorMessage">
                Invalid or expired verification link.
            </div>
            <p>Please try requesting a new verification email.</p>
            <a href="/auth/login" class="btn">Back to Login</a>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const loadingState = document.getElementById('loadingState');
        const successState = document.getElementById('successState');
        const errorState = document.getElementById('errorState');
        const errorMessage = document.getElementById('errorMessage');

        async function verifyEmail() {
            if (!token) {
                showError('No verification token provided');
                return;
            }

            try {
                const response = await fetch('/api/v1/auth/verify-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (data.success) {
                    loadingState.style.display = 'none';
                    successState.style.display = 'block';
                } else {
                    showError(data.error || 'Verification failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        function showError(message) {
            loadingState.style.display = 'none';
            errorMessage.textContent = message;
            errorState.style.display = 'block';
        }

        // Auto-verify on page load
        verifyEmail();
    </script>
</body>
</html>
