<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Agents - Zenthral</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 32px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #e0e7ff;
            color: #667eea;
        }

        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-danger:hover {
            background: #fecaca;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #6b7280;
        }

        .agents-list {
            display: grid;
            gap: 20px;
        }

        .agent-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 24px;
            align-items: center;
            transition: all 0.3s;
        }

        .agent-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .agent-icon {
            font-size: 48px;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
        }

        .agent-info {
            flex: 1;
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .agent-name {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
        }

        .agent-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-enabled {
            background: #d1fae5;
            color: #065f46;
        }

        .status-disabled {
            background: #fee2e2;
            color: #991b1b;
        }

        .agent-description {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .agent-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #9ca3af;
        }

        .agent-actions {
            display: flex;
            gap: 8px;
            flex-direction: column;
        }

        .agent-actions .btn {
            min-width: 120px;
            padding: 8px 16px;
            font-size: 13px;
        }

        .empty-state {
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            text-align: center;
            color: #6b7280;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #374151;
        }

        .empty-state-icon {
            font-size: 72px;
            margin-bottom: 16px;
        }

        .loading {
            background: white;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            color: #6b7280;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            float: right;
            background: #f3f4f6;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .notification.success {
            border-left: 4px solid #10b981;
        }

        .notification.error {
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <span>🔧</span>
                My Agents
            </h1>
            <div class="header-actions">
                <a href="/dashboard" class="btn btn-secondary">Dashboard</a>
                <a href="/marketplace/browse" class="btn btn-secondary">Browse Marketplace</a>
                <button onclick="logout()" class="btn btn-primary">Logout</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalAgents">0</div>
                <div class="stat-label">Total Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="enabledAgents">0</div>
                <div class="stat-label">Enabled</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="disabledAgents">0</div>
                <div class="stat-label">Disabled</div>
            </div>
        </div>

        <!-- Agents List -->
        <div class="agents-list" id="agentsList">
            <div class="loading">Loading your agents...</div>
        </div>
    </div>

    <!-- Configure Modal -->
    <div class="modal" id="configModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        let installedAgents = [];
        let currentAgent = null;

        window.onload = async () => {
            await loadInstalledAgents();
        };

        async function loadInstalledAgents() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/auth/login';
                return;
            }

            try {
                const response = await fetch('/api/v1/agents/installed', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (data.success) {
                    installedAgents = data.installed_agents;
                    updateStats();
                    renderAgents();
                }
            } catch (error) {
                console.error('Error loading agents:', error);
                document.getElementById('agentsList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Error loading agents</h3>
                        <p>Please try refreshing the page</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            const total = installedAgents.length;
            const enabled = installedAgents.filter(a => a.is_enabled).length;
            const disabled = total - enabled;

            document.getElementById('totalAgents').textContent = total;
            document.getElementById('enabledAgents').textContent = enabled;
            document.getElementById('disabledAgents').textContent = disabled;
        }

        function renderAgents() {
            const list = document.getElementById('agentsList');

            if (installedAgents.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <h3>No agents installed yet</h3>
                        <p>Visit the marketplace to install your first agent</p>
                        <a href="/marketplace/browse" class="btn btn-primary" style="margin-top: 20px;">Browse Marketplace</a>
                    </div>
                `;
                return;
            }

            list.innerHTML = installedAgents.map(agent => {
                const info = agent.agent_info || {};
                return `
                    <div class="agent-card">
                        <div class="agent-icon">${info.icon || '⚡'}</div>

                        <div class="agent-info">
                            <div class="agent-header">
                                <div class="agent-name">${info.name || 'Unknown Agent'}</div>
                                <span class="agent-status ${agent.is_enabled ? 'status-enabled' : 'status-disabled'}">
                                    ${agent.is_enabled ? '✓ Enabled' : '✗ Disabled'}
                                </span>
                            </div>

                            <div class="agent-description">${info.description || 'No description available'}</div>

                            <div class="agent-meta">
                                <span>📦 ${info.category || 'Unknown'}</span>
                                <span>🔄 v${info.version || '1.0.0'}</span>
                                <span>⚙️ ${agent.config ? 'Configured' : 'Not configured'}</span>
                            </div>
                        </div>

                        <div class="agent-actions">
                            <button
                                class="btn ${agent.is_enabled ? 'btn-secondary' : 'btn-primary'}"
                                onclick="toggleAgent('${agent.id}', ${!agent.is_enabled})"
                            >
                                ${agent.is_enabled ? 'Disable' : 'Enable'}
                            </button>

                            <button class="btn btn-secondary" onclick="openConfigModal('${agent.id}')">
                                Configure
                            </button>

                            <button class="btn btn-danger" onclick="confirmUninstall('${agent.id}', '${info.name}')">
                                Uninstall
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleAgent(agentId, enabled) {
            const token = localStorage.getItem('access_token');

            try {
                const response = await fetch(`/api/v1/agents/installed/${agentId}/toggle`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ enabled })
                });

                const data = await response.json();

                if (data.success) {
                    showNotification(data.message, 'success');
                    await loadInstalledAgents();
                } else {
                    showNotification(data.error, 'error');
                }
            } catch (error) {
                console.error('Error toggling agent:', error);
                showNotification('Failed to update agent status', 'error');
            }
        }

        function openConfigModal(agentId) {
            const agent = installedAgents.find(a => a.id === agentId);
            if (!agent) return;

            currentAgent = agent;
            const modal = document.getElementById('configModal');
            const content = document.getElementById('modalContent');

            const config = agent.config || {};
            const envVars = agent.agent_info?.env_vars_required || Object.keys(config);

            if (envVars.length === 0) {
                showNotification('This agent requires no configuration', 'error');
                return;
            }

            content.innerHTML = `
                <h2>Configure ${agent.agent_info?.name}</h2>
                <p style="color: #6b7280; margin: 12px 0 24px;">Update your agent configuration</p>

                <form id="configForm" onsubmit="updateConfig(event)">
                    ${envVars.map(varName => `
                        <div class="form-group">
                            <label>${varName}</label>
                            <input
                                type="${varName.includes('KEY') || varName.includes('SECRET') || varName.includes('PASSWORD') ? 'password' : 'text'}"
                                name="${varName}"
                                value="${config[varName] || ''}"
                                placeholder="Enter ${varName}"
                                required
                            >
                        </div>
                    `).join('')}

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Configuration</button>
                    </div>
                </form>
            `;

            modal.classList.add('active');
        }

        async function updateConfig(event) {
            event.preventDefault();

            const token = localStorage.getItem('access_token');
            const form = document.getElementById('configForm');
            const formData = new FormData(form);

            const config = {};
            formData.forEach((value, key) => {
                config[key] = value;
            });

            try {
                const response = await fetch(`/api/v1/agents/installed/${currentAgent.id}/config`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ config })
                });

                const data = await response.json();

                if (data.success) {
                    showNotification('Configuration updated successfully!', 'success');
                    closeModal();
                    await loadInstalledAgents();
                } else {
                    showNotification(data.error, 'error');
                }
            } catch (error) {
                console.error('Error updating config:', error);
                showNotification('Failed to update configuration', 'error');
            }
        }

        async function confirmUninstall(agentId, agentName) {
            if (!confirm(`Are you sure you want to uninstall "${agentName}"?`)) {
                return;
            }

            const token = localStorage.getItem('access_token');

            try {
                const response = await fetch(`/api/v1/agents/installed/${agentId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (data.success) {
                    showNotification('Agent uninstalled successfully!', 'success');
                    await loadInstalledAgents();
                } else {
                    showNotification(data.error, 'error');
                }
            } catch (error) {
                console.error('Error uninstalling agent:', error);
                showNotification('Failed to uninstall agent', 'error');
            }
        }

        function closeModal() {
            document.getElementById('configModal').classList.remove('active');
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.style.display = 'flex';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/auth/login';
        }
    </script>
</body>
</html>
